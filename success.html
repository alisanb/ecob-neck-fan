    <style>
        .success_wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            background-color: var(--bg-light);
            background-image: linear-gradient(135deg, var(--bg-light) 0%, #E8E5DF 100%);
        }
        .icon {
            font-size: 80px;
            color: var(--accent-gold);
            margin-bottom: 20px;
            text-shadow: 0 10px 20px rgba(193, 158, 103, 0.3);
        }
        .main_title {
            margin-bottom: 15px;
        }
        .subtitle {
            margin-bottom: 40px;
            font-size: 16px;
        }
        .btn_back {
            background-color: var(--primary-dark);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(26, 54, 38, 0.2);
        }
        .btn_back:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(26, 54, 38, 0.3);
            background-color: var(--primary-color);
        }
    </style>

<body>
    <div class="main_wrapper">
        <div class="success_wrapper">
            <div class="icon">✓</div>
            <h1 class="main_title">Спасибо за заказ!</h1>
            <p class="subtitle">Ваша заявка успешно отправлена. В ближайшее время с вами свяжется наш менеджер для уточнения деталей.</p>
            <a href="index.html" class="btn_back">Вернуться на сайт</a>
        </div>
    </div>
